version: "3"

includes:
  api:
    taskfile: ./api/Taskfile.yaml
    dir: ./api
  cli:
    taskfile: ./cli/Taskfile.yaml
    dir: ./cli
  web:
    taskfile: ./web/Taskfile.yaml
    dir: ./web
  site:
    taskfile: ./site/Taskfile.yaml
    dir: ./site
  infra:
    taskfile: ./infra/Taskfile.yaml
    dir: ./infra

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  sync-api:
    desc: Sync OpenAPI and regenerate web API client
    cmds:
      - task: api:openapi
      - task: web:gen-api

  all:fix:
    desc: Run fix tasks for all modules
    deps: [api:fix, cli:fix, web:fix, infra:fix]

  all:ci:
    desc: Run CI checks for all modules
    deps: [api:ci, cli:ci, web:ci, site:ci, infra:ci]

  all:build:
    desc: Build all modules for production
    deps: [api:build, cli:build, web:build, site:build]
  
  deploy:
    desc: Deploy all modules to production
    cmds:
      - task: all:build
      - task: infra:prod:deploy

  destroy:
    desc: Destroy all modules in production
    cmds:
      - task: infra:prod:destroy

  dev:
    desc: Run development environment with API and web servers
    deps: [infra:local:up]
    cmds:
      - task --parallel api:dev web:dev site:dev
