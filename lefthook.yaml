pre-commit:
  parallel: true
  jobs:
    - name: api ci
      glob: "api/**"
      run: task api:ci

    - name: cli ci
      glob: "cli/**"
      run: task cli:ci

    - name: web ci
      glob: "web/**"
      run: task web:ci

    - name: site ci
      glob: "site/**"
      run: task site:ci

    - name: infra ci
      glob: "infra/**"
      run: task infra:ci

pre-push:
  jobs:
    - run: task all:ci
