version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  fmt:
    desc: Format CLI code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet on CLI code
    cmds:
      - go vet ./...

  fix:
    desc: Run CLI format and vet
    deps: [fmt, vet]

  test:
    desc: Run CLI tests
    cmds:
      - go test ./...

  build:
    desc: Build CLI binary
    cmds:
      - go build -o dist/obsern .

  goreleaser:check:
    desc: Validate GoReleaser config
    cmds:
      - cd .. && goreleaser check --config .goreleaser.yaml

  goreleaser:build:
    desc: Build GoReleaser snapshot artifacts
    cmds:
      - cd .. && goreleaser build --snapshot --clean --config .goreleaser.yaml

  ci:
    desc: Run CLI CI checks
    cmds:
      - task: fix
      - task: test
      - task: build
      - task: goreleaser:check
      - task: goreleaser:build
      - git diff --exit-code -- .
