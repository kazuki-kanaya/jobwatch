name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag commit is reachable from main
        run: |
          git fetch origin main --tags --force
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag commit ${GITHUB_SHA} is not contained in origin/main"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./cli/go.mod
          cache-dependency-path: ./cli/go.sum
          cache: true

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload tagged install script
        run: |
          sed "s/__OBSERN_RELEASE_VERSION__/${GITHUB_REF_NAME}/g" install.sh > /tmp/install.sh
          gh release upload "${GITHUB_REF_NAME}" /tmp/install.sh#install.sh --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
